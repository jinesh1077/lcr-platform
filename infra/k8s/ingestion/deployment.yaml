apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: carrier-opt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
        - name: ingestion
          image: carrier-opt/ingestion:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: carrier-config
            - secretRef:
                name: carrier-secrets
          env:
            - name: POSTGRES_DSN
              value: postgres://carrier:$(POSTGRES_PASSWORD)@postgres:5432/carrier_opt?sslmode=disable
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
          resources:
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: carrier-opt
spec:
  ports:
    - port: 8080
  selector:
    app: ingestion
