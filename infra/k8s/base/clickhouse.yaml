apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: carrier-opt
spec:
  ports:
    - port: 8123
      name: http
    - port: 9000
      name: native
  selector:
    app: clickhouse
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: carrier-opt
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24-alpine
          ports:
            - containerPort: 8123
            - containerPort: 9000
          env:
            - name: CLICKHOUSE_DB
              valueFrom:
                configMapKeyRef:
                  name: carrier-config
                  key: CLICKHOUSE_DB
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: carrier-secrets
                  key: CLICKHOUSE_PASSWORD
          resources:
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init
          configMap:
            name: clickhouse-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
