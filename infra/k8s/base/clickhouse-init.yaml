apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init
  namespace: carrier-opt
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS carrier_opt;

    CREATE TABLE IF NOT EXISTS carrier_opt.cdr_raw (
        call_id UUID,
        dialed_number String,
        carrier_id String,
        duration_sec UInt32,
        answered UInt8,
        disconnect_reason String,
        timestamp DateTime,
        cost_theoretical Float64,
        ingested_at DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (carrier_id, timestamp)
    TTL timestamp + INTERVAL 7 DAY;

    CREATE TABLE IF NOT EXISTS carrier_opt.cdr_daily_agg (
        carrier_id String,
        prefix String,
        call_date Date,
        call_count UInt64,
        answered_count UInt64,
        total_cost Float64,
        avg_duration Float64
    ) ENGINE = SummingMergeTree()
    ORDER BY (carrier_id, prefix, call_date);
