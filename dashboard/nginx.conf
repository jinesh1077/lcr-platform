server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /ingestion/ {
        proxy_pass http://ingestion:8080/;
    }

    location /routing/ {
        proxy_pass http://routing-engine:8081/;
    }

    location /telemetry/ {
        proxy_pass http://telemetry:8082/;
    }

    location /mock/ {
        proxy_pass http://mock-carrier:8083/;
    }
}
