resolver 127.0.0.11 valid=10s ipv6=off;

upstream ingestion_svc {
    zone ingestion_svc 64k;
    server ingestion:8080 resolve;
}

upstream routing_svc {
    zone routing_svc 64k;
    server routing-engine:8081 resolve;
}

upstream telemetry_svc {
    zone telemetry_svc 64k;
    server telemetry:8082 resolve;
}

upstream mock_svc {
    zone mock_svc 64k;
    server mock-carrier:8083 resolve;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /ingestion/ {
        proxy_pass http://ingestion_svc/;
    }

    location /routing/ {
        proxy_pass http://routing_svc/;
    }

    location /telemetry/ {
        proxy_pass http://telemetry_svc/;
    }

    location /mock/ {
        proxy_pass http://mock_svc/;
    }
}
